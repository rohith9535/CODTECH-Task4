<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-LEARNING PLATFORM | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">E-LEARNING PLATFORM</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="progress.html">Progress</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
      <button class="mode-toggle" id="modeToggle" aria-label="Toggle theme">Theme</button>
    </div>
  </header>

  <main class="section">
    <div class="container form-wrap">
      <div class="section-head">
        <h1>Contact Us</h1>
      </div>

      <form id="contactForm" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button class="btn btn-primary" type="submit">Send Message</button>
        <p id="formMessage" class="hidden"></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 E-LEARNING PLATFORM. Learn boldly.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
